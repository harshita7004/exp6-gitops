apiVersion: apps/v1
kind: Deployment
metadata:
  name: exp6-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: exp6-app
  template:
    metadata:
      labels:
        app: exp6-app
    spec:
      containers:
      - name: exp6-app
        image: harshita7004/exp6-app:latest
        ports:
        - containerPort: 3000